<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>!Important Declaration And Use Cases</title>
    <link rel="stylesheet" href="main.css">
  </head>

  <body>
    <div class="one" style="background-color: red;">One</div>
    <br>
    <div class="two" style="background-color: yellow;">Two</div>
    <br>
    One is Blue because in main.css I wrote background-color: blue !important; !important made it has the priority
    <br>
    Two is Yellow because in main.css I wrote background-color: yellow; I didn't write !important so it doesn'y have the priority
    <br>
    The line style is the strongest
  </body>

</html>
